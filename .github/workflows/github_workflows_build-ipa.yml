name: Build IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup CMake
        run: |
          brew install cmake

      - name: Install dependencies
        run: |
          brew install ninja

      - name: Generate Xcode project with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -GXcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_SYSROOT=iphoneos
          cd ..

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project build/IPASigner.xcodeproj \
            -scheme IPASigner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination generic/platform=iOS \
            -archivePath build/IPASigner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Package archive (zip)
        run: |
          mkdir -p build/output
          if [ -d "build/IPASigner.xcarchive" ]; then
            ditto -c -k --sequesterRsrc --keepParent "build/IPASigner.xcarchive" "build/output/IPASigner.xcarchive.zip"
          else
            echo "Archive not found, skipping zip"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: makinon-build
          path: |
            build/output/*.ipa
            build/output/*.xcarchive.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/output/*.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
