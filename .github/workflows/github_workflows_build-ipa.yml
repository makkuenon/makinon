name: Build iOS IPA (Xcode + CMake Core)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # XCODE LOGIC REPLACER AGENT
      # ---------------------------------------------------------
      - name: Run Xcode Logic Replacer Agent
        uses: ./.github/actions/xcode-agent

      # ---------------------------------------------------------
      # BUILD SIGNING ENGINE (CMAKE)
      # ---------------------------------------------------------
      - name: Build signing engine (CMake)
        run: |
          mkdir -p build
          cd build
          cmake .. -GXcode
          cmake --build . --config Release

      # ---------------------------------------------------------
      # BUILD iOS APP (XCODE)
      # ---------------------------------------------------------
      - name: Build iOS app (Xcode)
        run: |
          xcodebuild \
            -project App/IPASigner.xcodeproj \
            -scheme IPASigner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/IPASigner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # ---------------------------------------------------------
      # EXPORT IPA
      # ---------------------------------------------------------
      - name: Export IPA
        run: |
          mkdir -p build/output
          xcodebuild \
            -exportArchive \
            -archivePath build/IPASigner.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist exportOptions.plist

      # ---------------------------------------------------------
      # ZIP ARCHIVE
      # ---------------------------------------------------------
      - name: Zip XCArchive
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/IPASigner.xcarchive" \
            "build/output/IPASigner.xcarchive.zip"

      # ---------------------------------------------------------
      # UPLOAD ARTIFACTS
      # ---------------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: makinon-build
          path: build/output/**
          retention-days: 30

      # ---------------------------------------------------------
      # RELEASE
      # ---------------------------------------------------------
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/output/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
