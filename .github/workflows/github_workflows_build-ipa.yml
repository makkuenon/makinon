name: Build iOS IPA (Auto Xcode Project)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # BUILD SIGNING ENGINE (CMAKE)
      # ---------------------------------------------------------
      - name: Build signing engine (CMake)
        run: |
          mkdir -p build
          cd build
          cmake .. -GXcode
          cmake --build . --config Release

      # ---------------------------------------------------------
      # GENERATE XCODE PROJECT
      # ---------------------------------------------------------
      - name: Generate Xcode project
        run: |
          mkdir -p App
          cd App

          # Create basic Xcode project structure
          swift package init --type executable

          # Replace Package.swift with iOS app settings
          cat > Package.swift << 'EOF'
          // swift-tools-version: 5.10
          import PackageDescription

          let package = Package(
              name: "IPASigner",
              platforms: [
                  .iOS(.v13)
              ],
              products: [
                  .executable(name: "IPASigner", targets: ["IPASigner"])
              ],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "IPASigner",
                      dependencies: [],
                      path: "."
                  )
              ]
          )
          EOF

          # Inject SwiftUI app files
          cp ../App/IPASignerApp.swift .
          cp ../App/ContentView.swift .
          cp ../App/SigningView.swift .
          cp ../App/SettingsView.swift .
          cp ../App/Info.plist .

          # Generate Xcode project
          swift package generate-xcodeproj

      # ---------------------------------------------------------
      # BUILD iOS APP (XCODE)
      # ---------------------------------------------------------
      - name: Build iOS app (Xcode)
        run: |
          xcodebuild \
            -project App/IPASigner.xcodeproj \
            -scheme IPASigner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/IPASigner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # ---------------------------------------------------------
      # EXPORT IPA
      # ---------------------------------------------------------
      - name: Export IPA
        run: |
          mkdir -p build/output
          xcodebuild \
            -exportArchive \
            -archivePath build/IPASigner.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist exportOptions.plist

      # ---------------------------------------------------------
      # UPLOAD ARTIFACTS
      # ---------------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: makinon-build
          path: build/output/**
          retention-days: 30
