name: Build IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ⚡ CMake cache
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build/CMakeFiles
            build/*.cmake
            build/IPASigner.xcodeproj
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Sources/**') }}
          restore-keys: |
            cmake-${{ runner.os }}-

      # ⚡ DerivedData cache
      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: build/DerivedData
          key: dd-${{ runner.os }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            dd-${{ runner.os }}-

      # ⚡ Swift module cache
      - name: Cache Swift ModuleCache
        uses: actions/cache@v4
        with:
          path: build/DerivedData/ModuleCache.noindex
          key: swiftmod-${{ runner.os }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            swiftmod-${{ runner.os }}-

      # ⚡ SDK stat cache
      - name: Cache SDK StatCache
        uses: actions/cache@v4
        with:
          path: build/DerivedData/SDKStatCaches.noindex
          key: sdkstat-${{ runner.os }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Generate Xcode project with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -GXcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cd ..

      - name: Build archive
        run: |
          xcodebuild \
            -project build/IPASigner.xcodeproj \
            -scheme IPASigner \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -archivePath build/IPASigner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Export IPA
        run: |
          mkdir -p build/output
          xcodebuild \
            -exportArchive \
            -archivePath build/IPASigner.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist exportOptions.plist

      - name: Zip XCArchive
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/IPASigner.xcarchive" \
            "build/output/IPASigner.xcarchive.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: makinon-build
          path: build/output/**
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/output/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
