<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SideSigner Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ——— Theme ——— */
:root {
  --bg:#05060a;
  --bg-alt:#0b0d14;
  --accent:#4af3ff;
  --accent-soft:rgba(74,243,255,0.15);
  --text:#f5f7ff;
  --muted:#8b90a5;
  --radius:14px;
}
body {
  margin:0;
  background:radial-gradient(circle at top,#15192b 0,#05060a 55%);
  color:var(--text);
  font-family:-apple-system,system-ui,sans-serif;
  padding:20px;
}
.page {
  max-width:1300px;
  margin:auto;
}

/* ——— Header ——— */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.cube {
  width:36px;
  height:36px;
  border-radius:10px;
  background:conic-gradient(from 210deg,#4af3ff,#7bffb8,#ffe66b,#ff4a7a,#4af3ff);
  padding:2px;
}
.cube-inner {
  width:100%;
  height:100%;
  border-radius:8px;
  background:#05060a;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent);
  font-weight:700;
}

/* ——— Layout Buttons ——— */
.layout-buttons {
  display:flex;
  gap:10px;
}
.btn {
  padding:8px 14px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-size:13px;
}
.btn-primary {
  background:var(--accent);
  color:#020308;
  font-weight:600;
}
.btn-ghost {
  background:transparent;
  border:1px solid #262b3f;
  color:var(--muted);
}

/* ——— Layout Containers ——— */
.layout {
  margin-top:20px;
}
.hidden {
  display:none;
}

/* ——— Grid Layout ——— */
.app-card {
  background:var(--bg-alt);
  border-radius:var(--radius);
  padding:14px;
  border:1px solid #1b1f2f;
  text-align:center;
  width:140px;
  display:inline-block;
  margin:10px;
}
.app-icon {
  width:90px;
  height:90px;
  border-radius:20px;
}
.app-name {
  margin-top:8px;
  font-size:13px;
}

/* ——— List Layout ——— */
.app-row {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1b1f2f;
  font-size:14px;
}

/* ——— Developer Layout ——— */
table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  padding:8px;
  border-bottom:1px solid #1b1f2f;
  font-size:13px;
}

/* ——— Signer Panel ——— */
.card {
  background:var(--bg-alt);
  border-radius:var(--radius);
  border:1px solid #1b1f2f;
  padding:16px;
  margin-top:20px;
}
.console {
  background:#05060a;
  border:1px solid #1b1f2f;
  padding:10px;
  font-family:monospace;
  font-size:12px;
  height:160px;
  overflow-y:auto;
}

/* ——— Progress Bar ——— */
.progress-bg {
  width:100%;
  height:6px;
  background:#15192b;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}
.progress-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4af3ff,#ff4a7a);
  transition:width .2s ease-out;
}
.progress-label {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* ——— Certificate Panel ——— */
.cert-item {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #1b1f2f;
}
</style>
</head>

<body>
<div class="page">

<!-- Header -->
<header class="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="cube"><div class="cube-inner">GD</div></div>
    <div>
      <div style="font-weight:600;">SideSigner Hub</div>
      <div style="font-size:12px;color:var(--muted);">All-in-one IPA signing platform</div>
    </div>
  </div>

  <div class="layout-buttons">
    <button id="btnGrid" class="btn btn-ghost">Grid</button>
    <button id="btnList" class="btn btn-ghost">List</button>
    <button id="btnDev" class="btn btn-ghost">Developer</button>
  </div>
</header>

<!-- Layouts -->
<div id="layout-grid" class="layout hidden"></div>
<div id="layout-list" class="layout hidden"></div>
<div id="layout-dev" class="layout hidden"></div>

<!-- Signer Panel -->
<div id="signer-panel" class="card">
  <h3>Sign IPA</h3>

  <button id="uploadIpaBtn" class="btn btn-ghost">Upload IPA</button>
  <button id="pickFromLibraryBtn" class="btn btn-ghost">Pick from library</button>
  <input type="file" id="ipaInput" accept=".ipa" hidden>

  <p id="selectedIpaLabel" style="font-size:12px;color:var(--muted);margin-top:6px;">No IPA selected.</p>

  <label>Certificate</label><br>
  <select id="certSelect" style="margin-top:4px;width:100%;"></select>

  <label style="margin-top:10px;">Signing mode</label><br>
  <select id="signMode" style="margin-top:4px;width:100%;">
    <option value="free">Apple ID (7 days)</option>
    <option value="dev">Developer (1 year)</option>
    <option value="enterprise">Enterprise</option>
  </select>

  <button id="signBtn" class="btn btn-primary" style="margin-top:12px;">Sign IPA</button>

  <div class="progress-bg">
    <div id="progressFill" class="progress-fill"></div>
  </div>
  <div id="progressLabel" class="progress-label">Idle</div>

  <div id="consoleLog" class="console" style="margin-top:12px;">Ready.</div>

  <button id="downloadBtn" class="btn btn-ghost" style="margin-top:10px;">Download Signed IPA</button>
  <button id="otaBtn" class="btn btn-ghost">Copy OTA Link</button>
  <button id="manifestBtn" class="btn btn-ghost">Show Manifest URL</button>
</div>

<!-- Certificate Panel -->
<div id="cert-panel" class="card">
  <h3>Certificate Library</h3>
  <div id="certList"></div>
  <button id="addCertBtn" class="btn btn-ghost" style="margin-top:10px;">Add Certificate</button>
</div>

<!-- IPA Library -->
<div id="library-panel" class="card">
  <h3>IPA Library</h3>
  <input type="text" id="searchInput" placeholder="Search apps…" style="width:100%;padding:6px;border-radius:8px;border:1px solid #262b3f;background:#05060a;color:var(--text);font-size:13px;">
  <div id="appList" style="max-height:300px;overflow-y:auto;margin-top:10px;"></div>
</div>

<script>
/* ——— Logging ——— */
function log(msg) {
  const c = document.getElementById("consoleLog");
  c.textContent += "\\n" + msg;
  c.scrollTop = c.scrollHeight;
}

/* ——— Layout Switching ——— */
function setLayout(type) {
  ["grid", "list", "dev"].forEach(l => {
    document.getElementById(`layout-${l}`).classList.add("hidden");
  });
  document.getElementById(`layout-${type}`).classList.remove("hidden");
  localStorage.setItem("preferredLayout", type);
}

document.getElementById("btnGrid").onclick = () => setLayout("grid");
document.getElementById("btnList").onclick = () => setLayout("list");
document.getElementById("btnDev").onclick = () => setLayout("dev");

/* ——— IPA Selection ——— */
const ipaInput = document.getElementById("ipaInput");
let selectedIPAFile = null;
let selectedIPAId = null;

document.getElementById("uploadIpaBtn").onclick = () => ipaInput.click();

ipaInput.onchange = e => {
  selectedIPAFile = e.target.files[0];
  selectedIPAId = null;
  log(`Selected local IPA: ${selectedIPAFile.name}`);
  document.getElementById("selectedIpaLabel").textContent =
    "Local IPA: " + selectedIPAFile.name;
};

document.getElementById("pickFromLibraryBtn").onclick = () => {
  log("Pick an IPA from the library below.");
};

/* ——— IPA Library Click ——— */
document.getElementById("appList").onclick = e => {
  const btn = e.target.closest("button[data-id]");
  if (!btn) return;

  selectedIPAId = btn.dataset.id;
  selectedIPAFile = null;

  log(`Selected library IPA: ${selectedIPAId}`);
  document.getElementById("selectedIpaLabel").textContent =
    "Library IPA ID: " + selectedIPAId;
};

/* ——— Certificate Library ——— */
async function loadCerts() {
  const res = await fetch("/api/certs");
  const certs = await res.json();

  const select = document.getElementById("certSelect");
  select.innerHTML = certs.map(c => `
    <option value="${c.id}">${c.name} (${c.type})</option>
  `).join("");

  renderCertPanel(certs);
}

function renderCertPanel(certs) {
  const panel = document.getElementById("certList");
  panel.innerHTML = certs.map(c => `
    <div class="cert-item">
      <span>${c.name}</span>
      <button onclick="deleteCert('${c.id}')">Delete</button>
    </div>
  `).join("");
}

async function deleteCert(id) {
  await fetch(`/api/certs/${id}`, { method:"DELETE" });
  log(`Deleted certificate: ${id}`);
  loadCerts();
}

document.getElementById("addCertBtn").onclick = async () => {
  const file = await pickFile(".p12,.pfx");
  if (!file) return;

  const name = prompt("Certificate name:");
  const password = prompt("Certificate password:");

  const form = new FormData();
  form.append("p12", file);
  form.append("name", name);
  form.append("password", password);
  form.append("type", "developer");

  await fetch("/api/certs", { method:"POST", body:form });

  log(`Added certificate: ${name}`);
  loadCerts();
};

function pickFile(accept) {
  return new Promise(resolve => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = accept;
    input.onchange = () => resolve(input.files[0]);
    input.click();
  });
}

/* ——— IPA Library ——— */
async function loadLibrary(query="") {
  const res = await fetch("/api/apps?search=" + encodeURIComponent(query));
  const apps = await res.json();

  renderGrid(apps);
  renderList(apps);
  renderDev(apps);
}

function renderGrid(apps) {
  const grid = document.getElementById("layout-grid");
  grid.innerHTML = apps.map(app => `
    <div class="app-card">
      <img src="${app.icon}" class="app-icon">
      <div class="app-name">${app.name}</div>
      <button class="btn btn-primary" onclick="selectLibraryIPA('${app.id}')">Sign</button>
    </div>
  `).join("");
}

function renderList(apps) {
  const list = document.getElementById("layout-list");
  list.innerHTML = apps.map(app => `
    <div class="app-row">
      <span>${app.name}</span>
      <button class="btn btn-ghost" onclick="selectLibraryIPA('${app.id}')">Sign</button>
    </div>
  `).join("");
}

function renderDev(apps) {
  const dev = document.getElementById("layout-dev");
  dev.innerHTML = `
    <table>
      <tr><th>Name</th><th>Bundle</th><th>Version</th><th>Action</th></tr>
      ${apps.map(app => `
        <tr>
          <td>${app.name}</td>
          <td>${app.bundleId}</td>
          <td>${app.versions[app.versions.length - 1]?.version || "?"}</td>
          <td><button class="btn btn-primary" onclick="selectLibraryIPA('${app.id}')">Sign</button></td>
        </tr>
      `).join("")}
    </table>
  `;
}

function selectLibraryIPA(id) {
  selectedIPAId = id;
  selectedIPAFile = null;
  log(`Selected library IPA: ${id}`);
  document.getElementById("selectedIpaLabel").textContent =
    "Library IPA ID: " + id;
}

/* ——— Search ——— */
document.getElementById("searchInput").oninput = e => {
  loadLibrary(e.target.value);
};

/* ——— Signing ——— */
document.getElementById("signBtn").onclick = async () => {
  if (!selectedIPAFile && !selectedIPAId) {
    return log("Select an IPA first.");
  }

  const certId = document.getElementById("certSelect").value;
  if (!certId) return log("Select a certificate.");

  startProgress("Signing IPA…");

  const form = new FormData();
  if (selectedIPAFile) form.append("ipa", selectedIPAFile);
  if (selectedIPAId) form.append("ipaId", selectedIPAId);

  form.append("certId", certId);
  form.append("mode", document.getElementById("signMode").value);

  const res = await fetch("/api/sign", { method:"POST", body:form });
  const json = await res.json();

  finishProgress("Done!");

  showResult(json);
};

/* ——— Progress Bar ——— */
function startProgress(label) {
  const bar = document.getElementById("progressFill");
  const text = document.getElementById("progressLabel");

  bar.style.width = "0%";
  text.textContent = label;

  let pct = 0;
  const timer = setInterval(() => {
    pct += Math.random() * 20;
    bar.style.width = Math.min(pct, 95) + "%";
    if (pct >= 95) clearInterval(timer);
  }, 300);
}

function finishProgress(label) {
  const bar = document.getElementById("progressFill");
  const text = document.getElementById("progressLabel");

  bar.style.width = "100%";
  text.textContent = label;
}

/* ——— Result Buttons ——— */
function showResult(result) {
  log("Signed IPA ready.");
  log("Download: " + result.signedIpaUrl);
  log("OTA: " + result.otaUrl);

  document.getElementById("downloadBtn").onclick = () => {
    window.location = result.signedIpaUrl;
  };

  document.getElementById("otaBtn").onclick = () => {
    navigator.clipboard.writeText(result.otaUrl);
    log("OTA link copied.");
  };

  document.getElementById("manifestBtn").onclick = () => {
    log("Manifest: " + result.manifestUrl);
  };
}

/* ——— Init ——— */
window.onload = () => {
  setLayout(localStorage.getItem("preferredLayout") || "grid");
  loadLibrary();
  loadCerts();
};
</script>

</body>
</html>
